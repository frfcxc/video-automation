services:
  - type: web
    name: video-automation-web
    env: docker
    dockerfilePath: ./apps/web/Dockerfile
    dockerContext: ./apps/web
    plan: free
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: video-automation-db
          property: connectionString
      - key: REDIS_URL
        fromService:
          name: video-automation-redis
          type: redis
          property: connectionString
      - key: FFMPEG_BINARY
        value: ffmpeg
      - key: FFPROBE_BINARY
        value: ffprobe
      - key: ASR_PROVIDER
        value: local-fallback
      - key: TRANSLATION_PROVIDER
        value: local-fallback
      - key: TTS_PROVIDER
        value: local-fallback
      - key: WORKER_MAX_ATTEMPTS
        value: "3"
      - key: WORKER_RETRY_DELAY_MS
        value: "5000"

  - type: worker
    name: video-automation-worker
    env: docker
    dockerfilePath: ./apps/web/Dockerfile
    dockerContext: ./apps/web
    plan: free
    command: node --experimental-strip-types ./scripts/worker.ts
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: video-automation-db
          property: connectionString
      - key: REDIS_URL
        fromService:
          name: video-automation-redis
          type: redis
          property: connectionString
      - key: FFMPEG_BINARY
        value: ffmpeg
      - key: FFPROBE_BINARY
        value: ffprobe
      - key: ASR_PROVIDER
        value: local-fallback
      - key: TRANSLATION_PROVIDER
        value: local-fallback
      - key: TTS_PROVIDER
        value: local-fallback
      - key: WORKER_MAX_ATTEMPTS
        value: "3"
      - key: WORKER_RETRY_DELAY_MS
        value: "5000"
      - key: WORKER_CONCURRENCY
        value: "1"

databases:
  - name: video-automation-db
    plan: free

  - name: video-automation-redis
    plan: free
