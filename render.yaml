services:
  - type: web
    name: video-automation-web
    env: node
    buildCommand: npm ci
    startCommand: npx next start -p 3000 -H 0.0.0.0
    rootDir: apps/web
    plan: free
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: video-automation-db
          property: connectionString
      - key: REDIS_URL
        sync: false
      - key: FFMPEG_BINARY
        value: ffmpeg
      - key: FFPROBE_BINARY
        value: ffprobe
      - key: ASR_PROVIDER
        value: local-fallback
      - key: TRANSLATION_PROVIDER
        value: local-fallback
      - key: TTS_PROVIDER
        value: local-fallback

databases:
  - name: video-automation-db
    plan: free
